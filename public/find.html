<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Find a blood donor in your area.">
  <title>Find Donors | Blood Connect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">🩸 Blood Connect</a>
    <div class="nav-links">
      <a href="find.html">Find Blood</a>
      <a href="register.html">Become a Donor</a>
      <a href="request.html">Request Blood</a>
      <a href="admin.html">Admin</a>
    </div>
  </nav>

  <div class="container">
    <h2 class="mb-4">Find a Blood Donor</h2>
    
    <div class="filters">
      <select id="search-blood" class="form-control">
        <option value="">All Blood Groups</option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
      </select>
      <input type="text" id="search-pincode" class="form-control" placeholder="Search by Pincode">
      <button id="search-btn" class="btn btn-primary">Search</button>
    </div>

    <div id="donor-grid" class="grid">
      <!-- Donor cards will be dynamically injected here -->
      <p class="text-muted">Loading donors...</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
