<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register as a blood donor on Blood Connect.">
  <title>Become a Donor | Blood Connect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">🩸 Blood Connect</a>
    <div class="nav-links">
      <a href="find.html">Find Blood</a>
      <a href="register.html">Become a Donor</a>
      <a href="request.html">Request Blood</a>
      <a href="admin.html">Admin</a>
    </div>
  </nav>

  <div class="container">
    <div class="form-container">
      <h2 class="text-center mb-4">Register as a Donor</h2>
      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="blood">Blood Group</label>
          <select id="blood" name="blood" class="form-control" required>
            <option value="" disabled selected>Select Blood Group</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
          </select>
        </div>
        <div class="form-group">
          <label for="pincode">Pincode / Zip Code</label>
          <input type="text" id="pincode" name="pincode" class="form-control" required placeholder="e.g. 110001">
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" class="form-control" required placeholder="e.g. +91 9876543210">
        </div>
        <button type="submit" class="btn btn-primary w-100" style="width: 100%;">Register Now</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
